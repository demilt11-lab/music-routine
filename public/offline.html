<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f97316" />
  <title>You're offline — BioMusic</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0c;
      color: #e5e7eb;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 1.5rem;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: #1a1a1e;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      stroke: #f97316;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f9fafb;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1rem;
      color: #9ca3af;
      max-width: 320px;
      line-height: 1.6;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #1f1f24;
      border: 1px solid #2d2d35;
      border-radius: 99px;
      padding: 0.35rem 0.9rem;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b7280;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      border-radius: 10px;
      border: none;
      background: #f97316;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #ea6c0a; }
    button:active { transform: scale(0.97); }

    .tip {
      font-size: 0.78rem;
      color: #4b5563;
      max-width: 280px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="icon">
    <!-- Wifi-off icon -->
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <circle cx="12" cy="20" r="1" fill="#f97316" stroke="none"/>
    </svg>
  </div>

  <h1>You're offline</h1>

  <p>BioMusic couldn't connect to the network. Check your internet connection and try again.</p>

  <div class="pill">
    <span class="dot"></span>
    Waiting for connection
  </div>

  <button onclick="tryReload()">Try again</button>

  <p class="tip">
    Your session data is saved locally and will sync automatically when you reconnect.
  </p>

  <script>
    function tryReload() {
      // Only navigate back if we're actually online now
      if (navigator.onLine) {
        window.location.replace("/dashboard");
      } else {
        const btn = document.querySelector("button");
        btn.textContent = "Still offline…";
        btn.style.background = "#374151";
        setTimeout(() => {
          btn.textContent = "Try again";
          btn.style.background = "";
        }, 2000);
      }
    }

    // Auto-reload when connectivity is restored
    window.addEventListener("online", () => {
      window.location.replace("/dashboard");
    });
  </script>
</body>
</html>
