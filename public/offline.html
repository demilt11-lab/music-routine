<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – BioMusic</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: hsl(240 10% 4%);
      color: hsl(0 0% 90%);
      padding: 1.5rem;
    }

    .container {
      text-align: center;
      max-width: 420px;
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      border-radius: 1.25rem;
      background: linear-gradient(135deg, hsl(24 95% 53%), hsl(24 95% 40%));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px hsl(24 95% 53% / 0.25);
    }

    .icon-wrap svg {
      width: 40px;
      height: 40px;
      color: white;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    p {
      color: hsl(240 5% 55%);
      line-height: 1.6;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 0.75rem;
      background: hsl(24 95% 53%);
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .retry-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px hsl(24 95% 53% / 0.35);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .status {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: hsl(240 5% 40%);
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: hsl(0 84% 60%);
      margin-right: 0.4rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap pulse">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" x2="22" y1="2" y2="22"/>
        <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
        <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
        <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
        <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/>
        <path d="M5 12.86a10 10 0 0 1 5.17-2.86"/>
        <line x1="12" x2="12.01" y1="20" y2="20"/>
      </svg>
    </div>

    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. BioMusic needs a connection to sync your sessions and stream music.</p>

    <button class="retry-btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
        <path d="M16 21h5v-5"/>
      </svg>
      Try Again
    </button>

    <div class="status">
      <span class="dot"></span> No internet connection
    </div>
  </div>

  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
