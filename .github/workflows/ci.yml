name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Type-check shared core
        run: npm run build:core

      - name: Type-check + bundle adaptive service
        run: npm run build:service

      - name: Type-check web app
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
